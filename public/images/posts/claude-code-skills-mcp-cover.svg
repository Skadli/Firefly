<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1440" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111B"/>
      <stop offset="0.55" stop-color="#0D2030"/>
      <stop offset="1" stop-color="#101B27"/>
    </linearGradient>
    <linearGradient id="panel" x1="308" y1="178" x2="1286" y2="724" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102537" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0B1621" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#59E6FF"/>
      <stop offset="1" stop-color="#1593C4"/>
    </linearGradient>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#CCFF66"/>
      <stop offset="1" stop-color="#78D728"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB866"/>
      <stop offset="1" stop-color="#F26D3D"/>
    </linearGradient>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="40" flood-color="#02060A" flood-opacity="0.55"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#183247" stroke-width="1" opacity="0.28"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="36" fill="url(#grid)"/>
  <circle cx="220" cy="170" r="150" fill="#163B4D" opacity="0.18"/>
  <circle cx="1380" cy="720" r="240" fill="#2C5021" opacity="0.15"/>
  <circle cx="1240" cy="140" r="90" fill="#5A2F1E" opacity="0.2"/>

  <g filter="url(#shadow)">
    <rect x="240" y="146" width="1120" height="608" rx="34" fill="url(#panel)" stroke="#2B4254" stroke-width="2"/>
  </g>

  <rect x="278" y="182" width="1044" height="28" rx="14" fill="#0B1823"/>
  <circle cx="312" cy="196" r="6" fill="#F26D3D"/>
  <circle cx="334" cy="196" r="6" fill="#F4B548"/>
  <circle cx="356" cy="196" r="6" fill="#7ED957"/>

  <g opacity="0.85">
    <rect x="300" y="252" width="244" height="104" rx="20" fill="#0D1D2A" stroke="#30495E"/>
    <rect x="300" y="382" width="244" height="104" rx="20" fill="#0D1D2A" stroke="#30495E"/>
    <rect x="300" y="512" width="244" height="104" rx="20" fill="#0D1D2A" stroke="#30495E"/>
    <rect x="300" y="642" width="244" height="70" rx="18" fill="#0D1D2A" stroke="#30495E"/>
  </g>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20" font-weight="700" letter-spacing="1">
    <text x="330" y="302" fill="#D8F1FF">SKILL</text>
    <text x="330" y="432" fill="#E0FFD3">PLAYBOOK</text>
    <text x="330" y="562" fill="#FFE1C0">PROMPTS</text>
    <text x="330" y="685" fill="#B4C7D6">CONFIG</text>
  </g>

  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" fill="#90A6B7">
    <text x="330" y="332">task-specific, lazy-loaded, reusable</text>
    <text x="330" y="462">checklists, references, templates</text>
    <text x="330" y="592">human rules, no prompt soup</text>
    <text x="330" y="705">hooks, permissions, shell</text>
  </g>

  <g>
