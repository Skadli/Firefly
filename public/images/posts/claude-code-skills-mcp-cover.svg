  <path d="M544 304H590" stroke="url(#cyan)" stroke-width="4"/>
  <path d="M544 434H590" stroke="url(#lime)" stroke-width="4"/>
  <path d="M544 564H590" stroke="url(#orange)" stroke-width="4"/>
  <path d="M986 400H1040" stroke="url(#cyan)" stroke-width="4"/>
  <path d="M788 556V612" stroke="#264659" stroke-width="3" stroke-dasharray="7 7"/>

  <g opacity="0.8">
    <rect x="122" y="92" width="168" height="44" rx="14" fill="#0B1721" stroke="#2E4858"/>
    <text x="148" y="120" fill="#9CB3C2" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16">claude code</text>
    <rect x="1298" y="760" width="182" height="44" rx="14" fill="#0B1721" stroke="#2E4858"/>
    <text x="1322" y="788" fill="#9CB3C2" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16">skills + mcp + hooks</text>
  </g>
