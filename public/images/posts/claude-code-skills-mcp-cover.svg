    <text x="626" y="274" fill="#D2E8F7" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16">claude session</text>

    <circle cx="640" cy="334" r="5" fill="#59E6FF"/>
    <rect x="658" y="325" width="174" height="10" rx="5" fill="#153548"/>
    <rect x="658" y="325" width="124" height="10" rx="5" fill="url(#cyan)"/>

    <circle cx="640" cy="380" r="5" fill="#CCFF66"/>
    <rect x="658" y="371" width="220" height="10" rx="5" fill="#19361C"/>
    <rect x="658" y="371" width="182" height="10" rx="5" fill="url(#lime)"/>

    <circle cx="640" cy="426" r="5" fill="#FFB866"/>
    <rect x="658" y="417" width="204" height="10" rx="5" fill="#372414"/>
    <rect x="658" y="417" width="142" height="10" rx="5" fill="url(#orange)"/>

    <path d="M636 468H938" stroke="#294152" stroke-width="2" stroke-dasharray="8 8"/>
    <rect x="626" y="490" width="144" height="38" rx="12" fill="#10283B" stroke="#3A6785"/>
    <rect x="806" y="490" width="144" height="38" rx="12" fill="#172B1A" stroke="#537C33"/>
    <text x="656" y="515" fill="#D8F1FF" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14">skills</text>
    <text x="848" y="515" fill="#E3FFD4" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14">mcp</text>
  </g>

  <g>
    <circle cx="1164" cy="324" r="58" fill="#0E1C28" stroke="#39617A" stroke-width="2"/>
    <circle cx="1164" cy="324" r="24" fill="url(#cyan)" filter="url(#glowCyan)"/>
    <text x="1134" y="390" fill="#D7EEF9" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" font-weight="700">MCP</text>

    <circle cx="1070" cy="242" r="42" fill="#0F1D2A" stroke="#314D5F"/>
    <circle cx="1272" cy="236" r="42" fill="#0F1D2A" stroke="#314D5F"/>
    <circle cx="1042" cy="410" r="42" fill="#0F1D2A" stroke="#314D5F"/>
    <circle cx="1288" cy="408" r="42" fill="#0F1D2A" stroke="#314D5F"/>
    <circle cx="1168" cy="500" r="42" fill="#0F1D2A" stroke="#314D5F"/>

    <path d="M1110 274L1144 302" stroke="url(#cyan)" stroke-width="4"/>
    <path d="M1232 272L1186 302" stroke="url(#cyan)" stroke-width="4"/>
    <path d="M1078 392L1128 346" stroke="url(#lime)" stroke-width="4"/>
    <path d="M1250 392L1204 346" stroke="url(#orange)" stroke-width="4"/>
    <path d="M1166 458L1164 382" stroke="url(#cyan)" stroke-width="4"/>

    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="15" font-weight="700" fill="#D3E7F2">
      <text x="1031" y="247">GIT</text>
      <text x="1234" y="241">DOCS</text>
      <text x="1006" y="415">DB</text>
      <text x="1243" y="413">BROWSER</text>
      <text x="1123" y="505">ISSUES</text>
    </g>
  </g>

  <g>
    <rect x="592" y="612" width="728" height="102" rx="22" fill="#0A1520" stroke="#30495E"/>
    <rect x="620" y="636" width="156" height="54" rx="16" fill="#10273A" stroke="#3E6780"/>
    <rect x="796" y="636" width="156" height="54" rx="16" fill="#162D18" stroke="#4C7232"/>
    <rect x="972" y="636" width="156" height="54" rx="16" fill="#2D2116" stroke="#8B5A33"/>
    <rect x="1148" y="636" width="144" height="54" rx="16" fill="#132130" stroke="#47637B"/>
    <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="16" font-weight="700">
