    <text x="1060" y="686" fill="#A3BBC9" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">GitHub, browser, docs, DB, CI</text>
    <text x="1060" y="718" fill="#A3BBC9" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">shared via .mcp.json</text>
  </g>

  <g>
