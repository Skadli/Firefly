  <text x="96" y="104" fill="#E8F6FF" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="34" font-weight="700">Claude Code extension map</text>
  <text x="96" y="148" fill="#93A9B9" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">Facts live in CLAUDE.md. Workflows live in Skills. External systems live in MCP. Deterministic guardrails live in Hooks.</text>

  <rect x="560" y="346" width="320" height="180" rx="28" fill="#0D1D2B" stroke="#385366" stroke-width="2"/>
  <text x="648" y="414" fill="#E6F4FD" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="32" font-weight="700">SESSION</text>
  <text x="614" y="454" fill="#9BB2C1" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">the active working context</text>
  <text x="608" y="492" fill="#9BB2C1" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">prompt + tool state + repo view</text>

  <g>
    <rect x="98" y="244" width="316" height="184" rx="24" fill="#112130" stroke="#3C627B" stroke-width="2"/>
    <text x="134" y="302" fill="#DFF5FF" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="28" font-weight="700">CLAUDE.md</text>
    <text x="134" y="340" fill="#9FB7C6" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">project facts</text>
    <text x="134" y="372" fill="#9FB7C6" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">build and test commands</text>
    <text x="134" y="404" fill="#9FB7C6" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">architecture decisions</text>
  </g>

  <g>
