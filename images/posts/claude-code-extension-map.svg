    <text x="1058" y="290" fill="#ECFFD8" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="28" font-weight="700">SKILLS</text>
    <text x="1058" y="328" fill="#B9D3A5" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">task playbooks</text>
    <text x="1058" y="360" fill="#B9D3A5" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">lazy-loaded references</text>
    <text x="1058" y="392" fill="#B9D3A5" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">slash commands and agent skills</text>
