    <text x="136" y="694" fill="#D8BA97" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">command, prompt, agent, http</text>
    <text x="136" y="726" fill="#D8BA97" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">and mcp_tool handlers</text>
  </g>

  <g>
