    <text x="640" y="742" fill="#E3F3FD" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="28" font-weight="700">PLUGINS</text>
    <text x="570" y="780" fill="#9AB0C0" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18">package skills, hooks, MCP and agents for reuse</text>
  </g>

  <g stroke-width="5" stroke-linecap="round">
