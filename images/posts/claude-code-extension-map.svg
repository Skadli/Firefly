  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="18" fill="#BFD4E1">
    <text x="108" y="858">Decision rule: facts -&gt; CLAUDE.md | repeatable workflow -&gt; Skill | external system -&gt; MCP | must-always-run -&gt; Hook</text>
  </g>
